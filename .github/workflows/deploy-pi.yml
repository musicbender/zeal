name: Deploy to Raspberry Pi

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      gaspar:
        description: Deploy gaspar
        type: boolean
        default: false
      worfbot-gateway:
        description: Deploy worfbot-gateway
        type: boolean
        default: false
      fiendlord-keep-ui:
        description: Deploy fiendlord-keep-ui
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  detect:
    name: Detect affected Pi apps
    runs-on: ubuntu-latest
    outputs:
      gaspar: ${{ steps.parse.outputs.gaspar }}
      worfbot-gateway: ${{ steps.parse.outputs.worfbot-gateway }}
      fiendlord-keep-ui: ${{ steps.parse.outputs.fiendlord-keep-ui }}
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Detect affected packages
        id: parse
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_GASPAR: ${{ inputs.gaspar }}
          INPUT_WORFBOT: ${{ inputs['worfbot-gateway'] }}
          INPUT_FIENDLORD: ${{ inputs['fiendlord-keep-ui'] }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "gaspar=$INPUT_GASPAR" >> "$GITHUB_OUTPUT"
            echo "worfbot-gateway=$INPUT_WORFBOT" >> "$GITHUB_OUTPUT"
            echo "fiendlord-keep-ui=$INPUT_FIENDLORD" >> "$GITHUB_OUTPUT"
          else
            AFFECTED=$(pnpm turbo run build --affected --dry-run=json 2>/dev/null)
            GASPAR=$(echo "$AFFECTED" | jq -r 'if ((.packages // []) | map(select(. == "gaspar")) | length) > 0 then "true" else "false" end')
            WORFBOT=$(echo "$AFFECTED" | jq -r 'if ((.packages // []) | map(select(. == "worfbot-gateway")) | length) > 0 then "true" else "false" end')
            FIENDLORD=$(echo "$AFFECTED" | jq -r 'if ((.packages // []) | map(select(. == "fiendlord-keep-ui")) | length) > 0 then "true" else "false" end')
            echo "gaspar=$GASPAR" >> "$GITHUB_OUTPUT"
            echo "worfbot-gateway=$WORFBOT" >> "$GITHUB_OUTPUT"
            echo "fiendlord-keep-ui=$FIENDLORD" >> "$GITHUB_OUTPUT"
          fi

  deploy-gaspar:
    name: Deploy gaspar
    needs: detect
    if: needs.detect.outputs.gaspar == 'true'
    runs-on: [self-hosted, magus]
    environment: pi-production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run build --filter=gaspar

      - run: pnpm --filter gaspar prisma:generate

      - name: Write secrets file
        run: printf 'DATABASE_URL=%s\n' "$DATABASE_URL" | sudo tee /etc/gaspar/env > /dev/null

      - run: sudo systemctl restart gaspar

  deploy-worfbot-gateway:
    name: Deploy worfbot-gateway
    needs: detect
    if: needs.detect.outputs.worfbot-gateway == 'true'
    runs-on: [self-hosted, magus]
    environment: pi-production
    env:
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
      DISCORD_PUBLIC_KEY: ${{ secrets.DISCORD_PUBLIC_KEY }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run build --filter=worfbot-gateway

      - name: Write secrets file
        run: |
          printf 'DISCORD_BOT_TOKEN=%s\nDISCORD_APP_ID=%s\nDISCORD_PUBLIC_KEY=%s\n' \
            "$DISCORD_BOT_TOKEN" "$DISCORD_APP_ID" "$DISCORD_PUBLIC_KEY" \
            | sudo tee /etc/worfbot-gateway/env > /dev/null

      - run: sudo systemctl restart worfbot-gateway

  deploy-fiendlord-keep:
    name: Deploy fiendlord-keep-ui
    needs: detect
    if: needs.detect.outputs.fiendlord-keep-ui == 'true'
    runs-on: [self-hosted, magus]
    environment: pi-production
    env:
      HOMEBRIDGE_API_KEY: ${{ secrets.HOMEBRIDGE_API_KEY }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter fiendlord-keep-ui build

      - name: Verify build output
        run: |
          if [ ! -f apps/fiendlord-keep-ui/.next/BUILD_ID ]; then
            echo "ERROR: .next/BUILD_ID missing after build"
            exit 1
          fi

      - name: Write secrets file
        run: |
          printf 'API_BASE_URL=http://localhost:3002\nHOMEBRIDGE_API_KEY=%s\n' \
            "$HOMEBRIDGE_API_KEY" \
            | sudo tee /etc/fiendlord-keep/env > /dev/null

      - run: sudo systemctl restart fiendlord-keep
