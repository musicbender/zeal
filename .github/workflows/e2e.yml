name: E2E Tests

# Triggered by Vercel's GitHub integration when a deployment status changes.
on:
  deployment_status:

jobs:
  e2e:
    name: Playwright API tests
    runs-on: ubuntu-latest

    # Only run when a Preview deployment succeeds
    if: |
      github.event.deployment_status.state == 'success' &&
      startsWith(github.event.deployment_status.environment, 'Preview')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter portfolio-e2e install:browsers

      - name: Wait for deployment to be ready
        run: |
          URL="${PORTFOLIO_BASE_URL}"
          echo "Waiting for $URL to be ready..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Deployment is ready!"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, waiting 10s..."
            sleep 10
          done
          echo "Deployment not ready after 5 minutes"
          exit 1
        env:
          PORTFOLIO_BASE_URL: ${{ github.event.deployment_status.target_url }}

      - name: Run E2E tests against preview URL
        working-directory: apps/portfolio-e2e
        run: pnpm test:e2e --project=api
        env:
          PORTFOLIO_BASE_URL: ${{ github.event.deployment_status.target_url }}
          PORTFOLIO_API_KEY: ${{ secrets.PORTFOLIO_API_KEY }}
