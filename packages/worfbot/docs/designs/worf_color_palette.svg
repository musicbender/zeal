  <text x="84" y="148" text-anchor="middle" style="fill:rgb(240, 236, 228);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:13px;font-weight:500;text-anchor:middle;dominant-baseline:auto">obsidian black</text>
  <text x="84" y="163" text-anchor="middle" style="fill:rgba(240, 236, 228, 0.65);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">#151210</text>
  <text x="84" y="88" text-anchor="middle" font-size="11" fill="rgba(240,236,228,0.5)" style="fill:rgb(240, 236, 228);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:13px;font-weight:500;text-anchor:middle;dominant-baseline:auto">armor, shadow,</text>
  <text x="84" y="103" text-anchor="middle" font-size="11" fill="rgba(240,236,228,0.5)" style="fill:rgb(240, 236, 228);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:13px;font-weight:500;text-anchor:middle;dominant-baseline:auto">the void of space</text>

